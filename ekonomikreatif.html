<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekonomi Kreatif Sumedang</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', sans-serif; color: #fff; min-height: 100vh; 
            background-size: cover; background-position: center; background-attachment: fixed; 
            padding: 20px;
            /* Latar belakang halaman utama */
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('assets/bg-utama.jpg');
        }
        .container { max-width: 1000px; margin: auto; padding: 50px 20px; text-align: center; }
        
        h1 { color: #ff9f43; margin-bottom: 50px; font-size: 3rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        /* Grid Card Utama */
        .grid-main { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        
        /* Card yang mengarah ke file lain */
        .card-link { 
            display: block; height: 450px; border-radius: 20px; background-size: cover; 
            background-position: center; border: 3px solid rgba(255,255,255,0.2);
            text-decoration: none; display: flex; align-items: flex-end; 
            transition: 0.4s; position: relative; overflow: hidden;
        }
        .card-link:hover { transform: translateY(-10px); border-color: #ff9f43; }
        
        /* Efek gelap di bawah teks */
        .card-link::after { content: ""; position: absolute; width: 100%; height: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        .card-link h3 { position: relative; z-index: 1; padding: 30px; font-size: 2rem; color: #fff; width: 100%; text-align: left; }

        /* Tombol Kembali */
        .btn-home { 
            display: inline-block; margin-top: 60px; padding: 15px 30px; 
            background: #ff9f43; color: #000; border-radius: 50px; 
            text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .btn-home:hover { background: #e67e22; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ekonomi Kreatif Sumedang</h1>
        
        <div class="grid-main">
            <!-- Link ke file khusus Kuliner -->
            <a href="kuliner.html" class="card-link" style="background-image: url('assets/kuliner.png');">
                <h3>Kuliner</h3>
            </a>
            
            <!-- Link ke file khusus Kriya -->
            <a href="kriya.html" class="card-link" style="background-image: url('assets/kriya.png');">
                <h3>Kriya</h3>
            </a>
            
            <!-- Link ke file khusus Seni -->
            <a href="seni.html" class="card-link" style="background-image: url('assets/seni.png');">
                <h3>Seni Pertunjukan</h3>
            </a>
        </div>

        <a href="index.html" class="btn-home">← Kembali ke Beranda Utama</a>
    </div>

</body>
</html>
